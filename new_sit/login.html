<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معك | تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body class="auth-page">
  <nav class="navbar" id="main-navbar"></nav>

  <div class="section" style="display: flex; justify-content: center; align-items: center; flex: 1;">
    <div class="glass-card auth-card" style="width: 100%; max-width: 500px; text-align: center;">
      <h2 style="font-size: 36px; margin-bottom: 8px;">تسجيل الدخول</h2>
      <p class="mb-4" style="font-size: 18px; opacity: 0.9; margin-bottom: 35px;">أهلاً بك مجدداً في منصة معك</p>

      <div class="input-group" style="margin-bottom: 25px;">
        <label for="username" style="font-size: 16px;">الاسم</label>
        <input id="username" type="text" class="input-field auth-input" placeholder="اكتب اسمك هنا..."
          onkeydown="if(event.key === 'Enter') login()">
      </div>

      <div class="input-group" style="margin-bottom: 30px;">
        <label for="password" style="font-size: 16px;">كلمة المرور</label>
        <input id="password" type="password" class="input-field auth-input" placeholder="***"
          onkeydown="if(event.key === 'Enter') login()">
      </div>

      <button onclick="login()" class="btn auth-btn"
        style="width: 100%; margin-top: 15px; font-size: 20px; padding: 18px;">دخول</button>
    </div>
  </div>

  <footer>
    © 2026 معك - جميع الحقوق محفوظة
  </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معك | تواصل معنا</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <nav class="navbar" id="main-navbar"></nav>

    <div class="section">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 50px;">
            <h1 class="text-center">تواصل معنا</h1>
            <p class="text-center mb-4">يسعدنا سماع اقتراحاتك واستفساراتك</p>

            <form onsubmit="event.preventDefault(); alert('تم إرسال رسالتك بنجاح! شكراً لتواصلك.'); this.reset();">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" class="input-field" required placeholder="أدخل اسمك الكريم">
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="input-field" required placeholder="example@email.com">
                </div>

                <div class="input-group">
                    <label>الرسالة</label>
                    <textarea class="input-field" required placeholder="اكتب رسالتك هنا..." rows="5"
                        style="resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px; font-size: 18px;">إرسال
                    الرسالة</button>
            </form>
        </div>
    </div>

    <footer>
        © 2026 معك - جميع الحقوق محفوظة
    </footer>
</body>

</html>

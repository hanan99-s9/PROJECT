<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معك | من نحن</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <nav class="navbar" id="main-navbar"></nav>

    <div class="section">
        <div class="glass-card mb-4 text-center">
            <h2>عن منصة معك</h2>
            <p style="font-size: 18px; max-width: 800px; margin: 0 auto; line-height: 1.8;">
                معك هو تطبيق ذكي يهدف إلى تسهيل التواصل مع الصم
                من خلال تقنيات حديثة تساعد في ترجمة لغة الإشارة بسرعة ودقة.
            </p>
        </div>

        <div class="glass-card mb-4" style="text-align: center;">
            <h2 class="text-center">فيديو تعريفي</h2>
            <div
                style="border-radius:15px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--glass-border); max-width: 800px; margin: 0 auto;">
                <iframe width="100%" height="450" src="https://www.youtube.com/embed/XXXXX" frameborder="0"
                    allowfullscreen></iframe>
            </div>
        </div>

        <div class="glass-card">
            <h2 class="text-center">فريق العمل 👩‍💻</h2>
            <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); text-align:center;">
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">جمانة الغامدي</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">ميان الشهراني</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">لين الجهني</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">حنان القشقري</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">ضحى الهدهدي</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">ريناد الحربي</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">ريناد الخميسي</h3>
                </div>
                <div class="glass-card" style="padding:25px; transition: transform 0.3s; cursor: pointer;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'">
                    <h3 style="margin: 0; font-size: 18px;">رغد اليماني</h3>
                </div>
            </div>
        </div>
    </div>

    <footer>
        © 2026 معك - جميع الحقوق محفوظة
    </footer>
</body>

</html>

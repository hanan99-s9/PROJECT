<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<style>
body{
    font-family:Arial;
    background:#F4F9FF;
    text-align:center;
}
.box{
    background:white;
    padding:30px;
    width:300px;
    margin:100px auto;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input{
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px 20px;
    background:#1E88E5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#1565C0;
}
</style>
</head>
<body>

<div class="box">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="user" placeholder="اسم المستخدم"><br>
    <input type="password" id="pass" placeholder="كلمة المرور"><br>
    <button onclick="login()">دخول</button>
    <p id="msg"></p>
</div>

<script>
function login(){
    var user = document.getElementById("user").value;
    var pass = document.getElementById("pass").value;

    if(pass === "1234"){
        localStorage.setItem("username", user);
        window.location.href="dashboard.html";
    }else{
        document.getElementById("msg").innerHTML="كلمة المرور غير صحيحة ❌";
    }
}
</script>

</body>
</html>

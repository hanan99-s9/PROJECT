<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#F4F9FF;
    text-align:center;
}
nav{
    background:#1E88E5;
    padding:15px;
    color:white;
    display:flex;
    justify-content:space-between;
}
button{
    padding:8px 15px;
    background:#1565C0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#0D47A1;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:50px;
}
.card{
    background:white;
    width:300px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
    text-decoration:none;
    color:#2C3E50;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.card h2{
    margin-bottom:10px;
    color:#1565C0;
}
.card p{
    font-size:16px;
}
</style>
</head>
<body>

<nav>
    <div>🤟 with you </div>
    <div>
        <span id="welcome"></span>
        <button onclick="logout()">تسجيل خروج</button>
    </div>
</nav>

<h1>لوحة التحكم</h1>
<p>اختر القسم الذي تريد الدخول إليه</p>

<div class="container">
    <a href="about.html" class="card">
        <h2> عن الموقع</h2>
        <p>تعرف على فكرة وفريق العمل</p>
    </a>

    <a href="#" class="card">
        <h2>تحميل التطبيق</h2>
        <p>اضغط لتحميل التطبيق على جوالك</p>
    </a>
</div>

<script>
var user = localStorage.getItem("username");
if(!user){
    window.location.href="login.html";
}else{
    document.getElementById("welcome").innerHTML="مرحباً " + user;
}

function logout(){
    localStorage.removeItem("username");
    window.location.href="index.html";
}
</script>

</body>
</html>

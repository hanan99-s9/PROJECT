<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معك</title>

<style>

body{
    margin:0;
    font-family:Arial;
    direction:rtl;
    background:#f4f9ff;
}

/* الهيدر */
.navbar{
    background:#1a73e8;
    color:white;
    padding:15px;
    font-size:26px;
    text-align:center;
    font-weight:bold;
}

/* الواجهة */
.hero{
    height:550px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
}

/* صندوق الفيديو */
.video-box{
    position:relative;
    width:500px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.video-box img{
    width:100%;
    display:block;
}

/* زر التشغيل */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    background:rgba(0,0,0,0.6);
    color:white;
    width:80px;
    height:80px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* النص */
.hero-text{
    text-align:center;
}

.hero-text h1{
    color:#1a73e8;
    font-size:40px;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:14px 35px;
    background:#1a73e8;
    color:white;
    text-decoration:none;
    border-radius:25px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="navbar">معك</div>

<div class="hero">

    <!-- صورة لغة الإشارة -->
    <div class="video-box">
        <img src="07ad6681-ee50-439a-9d07-4197cd7173bf" alt="sign language">
        <div class="play-btn">▶</div>
    </div>

    <!-- النص -->
    <div class="hero-text">
        <h1>مرحباً بك في موقع معك</h1>
        <p>منصة تساعد الصم على التواصل بسهولة</p>
        <a href="login.html" class="btn">تسجيل الدخول</a>
    </div>

</div>

</body>
</html>
